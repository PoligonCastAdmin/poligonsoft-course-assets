<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PoligonSoft Course Editor</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Local editor</p>
      <h1>PoligonSoft Free Course</h1>
    </div>
    <div class="header-actions">
      <button data-action="reload" class="button is-secondary" type="button">Reload</button>
      <button data-action="save" class="button is-primary" type="button">Save files</button>
      <button data-action="publish" class="button is-dark" type="button">Publish to GitHub</button>
    </div>
  </header>

  <nav class="view-tabs" aria-label="Editor sections">
    <button data-view="general" class="view-tab is-active" type="button">General</button>
    <button data-view="sections" class="view-tab" type="button">Sections</button>
    <button data-view="lessons" class="view-tab" type="button">Lessons</button>
  </nav>

  <main class="layout">
    <aside class="sidebar">
      <div id="structure-list" class="structure-list"></div>
      <div id="sidebar-actions" class="sidebar-actions"></div>
    </aside>

    <section class="editor">
      <div id="status" class="status">Loading...</div>

      <section id="general-view" class="editor-view is-active">
        <div class="panel">
          <div class="panel-heading">
            <h2>General information</h2>
          </div>
          <div id="general-form"></div>
        </div>
      </section>

      <section id="sections-view" class="editor-view">
        <div class="panel">
          <div class="panel-heading">
            <h2>Sections</h2>
            <div class="inline-actions">
              <button data-action="module-up" class="icon-button" type="button">Up</button>
              <button data-action="module-down" class="icon-button" type="button">Down</button>
              <button data-action="delete-module" class="icon-button is-danger" type="button">Delete</button>
            </div>
          </div>
          <div id="sections-form"></div>
        </div>
      </section>

      <section id="lessons-view" class="editor-view">
        <div class="panel">
          <div class="panel-heading">
            <h2>Lessons</h2>
            <div class="inline-actions">
              <button data-action="lesson-up" class="icon-button" type="button">Up</button>
              <button data-action="lesson-down" class="icon-button" type="button">Down</button>
              <button data-action="regenerate-lesson-paths" class="icon-button" type="button">Paths</button>
              <button data-action="delete-lesson" class="icon-button is-danger" type="button">Delete</button>
            </div>
          </div>
          <div id="lessons-form"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="/editor.js"></script>
</body>
</html>
